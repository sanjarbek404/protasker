name: Deploy Next.js site to GitHub Pages

on:
  # Ishga tushish shartlari: main branchga push bo'lganda
  push:
    branches: ["main"]
  # Manual tarzda ishga tushirish imkoniyati
  workflow_dispatch:

# GITHUB_TOKEN ruxsatlarini sozlash
permissions:
  contents: read
  pages: write
  id-token: write

# Bitta paytda bir nechta deploy ishga tushib ketmasligini ta'minlash
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Loyihani build qilish qismi
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build with Next.js
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deploy qilish qismi
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
